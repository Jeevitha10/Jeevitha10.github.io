<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="studentsignup.css">
    <link rel = "icon" href = "https://seeklogo.com/images/S/sir-basic-logo-DF929080D5-seeklogo.com.gif"    type = "image/x-icon">
    <title>STUDENT-LOGIN</title>
    <script src="scriptt.js"></script>
</head>
<body>
    
       
       
        <div class="container">
            <header class="header">
              <h1 id="title" class="text-center">STUDENT SIGNUP</h1>
              
            </header>
            <form id="survey-form">
              <div class="form-group">
                <label id="name-label" for="name">Name</label>
                <input
                  type="text"
                  name="name"
                  id="name"
                  class="form-control"
                  placeholder="Enter your name"
                  required
                />
              </div>
              <div class="form-group">
                <label id="email-label" for="email">Email</label>
                <input
                  type="email"
                  name="email"
                  id="email"
                  class="form-control"
                  placeholder="Enter your Email"
                  required
                />
              </div>
              <div class="form-group">
                <label id="number-label" for="number"
                  >Age<span class="clue">(optional)</span></label
                >
                <input
                  type="number"
                  name="age"
                  id="number"
                  min="10"
                  max="99"
                  class="form-control"
                  placeholder="Age"
                />
              </div>
              <div class="form-group">
                <label id="number-label" for="number"
                  >REGISTER NUMBER</label
                >
                <input
                  type="number"
                  name="age"
                  id="number"
                  
                  class="form-control"
                  placeholder="REGISTER NUMBER"
                />
              </div>
              <div class="form-group">
                <p>Department</p>
                <select id="dropdown" name="Department" class="form-control" required>
                  <option disabled selected value>Select Department</option>
                  <option value="cs">Computer Science</option>
                  <option value="ec">Electronics and Communication</option>
                  <option value="ee">Electrical and Electronic</option>
                  <option value="bio">Bio Technology</option>
                  <option value="it">Information Technology</option>
                </select>
              </div>
          
              <div class="form-group">
                <p>YEAR</p>
                <label>
                  <input
                    name="user-recommend"
                    value="1ST"
                    type="radio"
                    class="input-radio"
                    checked
                  />1ST YEAR</label
                >
                <label>
                  <input
                    name="user-recommend"
                    value="2ND"
                    type="radio"
                    class="input-radio"
                  />2ND YEAR</label
                >
          
                <label
                  ><input
                    name="user-recommend"
                    value="3RD"
                    type="radio"
                    class="input-radio"
                  />3RD YEAR</label
                >
                <label
                  ><input
                    name="user-recommend"
                    value="4TH"
                    type="radio"
                    class="input-radio"
                  />4TH YEAR</label
                >
              </div>
          
              <div class="form-group">
                <p>
                  SECTION
                </p>
                <select id="most-like" name="mostLike" class="form-control" required>
                  <option disabled selected value>Select a section</option>
                  <option value="A">A</option>
                  <option value="B">B</option>
                  <option value="C">C</option>
                  
                </select>
              </div>
          
            
          
              <div class="form-group">
                <button type="submit" id="submit" class="submit-button">
                  Submit
                </button>
              </div>
            </form>
          </div>
          
      
</body>
</html>
